name: Daily question bank update

on:
  schedule:
    - cron: "17 6 * * *"   # every day 06:17 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ingest new questions from verified open-licensed sources
        run: python scripts/ingest.py

      - name: Commit updated bank if changed
        run: |
          if git diff --quiet data/questions.json; then
            echo "No new questions today."
            exit 0
          fi
          git config user.name "cissp-world-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/questions.json
          git commit -m "chore: daily question bank update ($(date -u +%F))"
          git push
